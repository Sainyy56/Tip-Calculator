<!DOCTYPE html>
<html>
    <head>
        <title>Tip Calculator</title>
        <link rel="stylesheet" href="../css/home.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="container">
        <div class="main">
            <h1>Tip Calculator</h1>
            <p>Enter the total bill amount and the desired tip percentage to calculate your tip.</p>
            <br><br>
            <label for="Bill">Bill Amount:</label>
            <br><br>
            <input type="number" id="Bill" placeholder="Enter bill amount">
            <br><br>
            <label for="Tip">Tip Percentage:</label>
            <br><br>
            <input type="number" id="Tip" placeholder="Enter tip percentage">
            <br><br>
            <button onclick="calculateTip()">Calculate Tip</button>
            <br><br>
            <span id="result">Total:</span>
        </div>
        </div>
        <script src="../js/home.js"></script>
    </body>
</html>
